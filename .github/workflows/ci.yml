name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: superclipboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d superclipboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      SUPERCLIPBOARD_REMOTE_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/superclipboard_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend
        run: |
          pnpm lint
          pnpm test
          pnpm build

      - name: Verify Rust
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Verify PostgreSQL storage
        run: >-
          cargo test --manifest-path src-tauri/Cargo.toml
          remote_storage::tests::remote_schema_smoke_from_env
          -- --ignored --exact --test-threads=1
